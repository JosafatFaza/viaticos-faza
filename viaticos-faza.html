<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viáticos — Grupo Faza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #161b22;
  --bg3:       #1c2230;
  --border:    #2a3346;
  --border2:   #374055;
  --accent:    #ff6b00;
  --accent2:   #ff8c38;
  --text:      #e6edf3;
  --text2:     #8b949e;
  --text3:     #6e7681;
  --green:     #3fb950;
  --yellow:    #d29922;
  --red:       #f85149;
  --blue:      #388bfd;
  --purple:    #a371f7;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.4);
  --trans:     all .18s ease;
}

/* ─── MODO CLARO ────────────────────────────────────────── */
body.light-mode {
  --bg:        #f6f8fa;
  --bg2:       #ffffff;
  --bg3:       #eef1f5;
  --border:    #d0d7de;
  --border2:   #b9c0ca;
  --accent:    #e05f00;
  --accent2:   #cc5500;
  --text:      #1a1f2e;
  --text2:     #57606a;
  --text3:     #8c959f;
  --green:     #1a7f37;
  --yellow:    #9a6700;
  --red:       #cf222e;
  --blue:      #0969da;
  --purple:    #6e40c9;
  --shadow:    0 4px 24px rgba(0,0,0,.1);
}

/* Transición de tema solo en elementos que la necesitan */
body, .sidebar, .main, .topbar, .content, .card, .stat-card, .modal,
.login-card, .form-group input, .form-group select, .form-group textarea,
.nav-item, .btn, .badge, .alert, table, td, th {
  transition: background-color .2s ease, border-color .2s ease;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg2); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── LOGIN ────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,107,0,.18) 0%, transparent 60%), var(--bg);
}
.login-card {
  width: 420px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; box-shadow: var(--shadow);
  animation: fadeUp .4s ease;
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.login-logo h1 { font-size: 20px; font-weight: 700; }
.login-logo span { font-size: 12px; color: var(--text2); display: block; }
.login-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.login-card p { color: var(--text2); margin-bottom: 28px; font-size: 13px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 14px; color: var(--text); font-family: inherit; font-size: 14px;
  transition: var(--trans); outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,.15); }
.form-group select option { background: var(--bg3); }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: var(--radius); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--trans); border: 1px solid transparent; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: transparent; color: var(--text2); border-color: var(--border); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-green:hover { filter: brightness(1.1); }
.btn-red { background: rgba(248,81,73,.15); color: var(--red); border-color: rgba(248,81,73,.3); }
.btn-red:hover { background: rgba(248,81,73,.25); }
.btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }

/* ─── APP LAYOUT ────────────────────────────────────────── */
#app { display: none; height: 100vh; height: 100svh; overflow: hidden; }
.layout { display: flex; height: 100vh; height: 100svh; overflow: hidden; }

/* Sidebar oculto en móvil desde el inicio */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform .28s ease;
    background: var(--bg2) !important;
  }
  .sidebar.open { transform: translateX(0); }

  /* Colores explícitos para elementos del nav en móvil */
  .sidebar .nav-section-title { color: #6e7681 !important; }
  .sidebar .nav-item { color: #8b949e !important; background: transparent !important; }
  .sidebar .nav-item:hover { background: rgba(255,255,255,.06) !important; color: #e6edf3 !important; }
  .sidebar .nav-item.active { color: #ff6b00 !important; background: rgba(255,107,0,.12) !important; }
  .sidebar .nav-icon { opacity: 1 !important; }
  .sidebar .nav-badge { background: #ff6b00 !important; color: #fff !important; }
  .sidebar-logo-text { color: #e6edf3 !important; }
  .sidebar-user-info strong { color: #e6edf3 !important; }
  .sidebar-user-info span { color: #8b949e !important; }
  body.light-mode .sidebar .nav-item { color: #57606a !important; }
  body.light-mode .sidebar .nav-item:hover { color: #1a1f2e !important; }
  body.light-mode .sidebar .nav-section-title { color: #8c959f !important; }
}

/* SIDEBAR */
.sidebar {
  width: 230px; min-width: 230px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.sidebar-logo { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.sidebar-logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.sidebar-logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
.sidebar-logo-text span { font-size: 11px; color: var(--text2); font-weight: 400; display: block; }
.sidebar-user { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg3); border-radius: 8px; }
.sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-info strong { font-size: 12px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-info span { font-size: 11px; color: var(--text2); }

.sidebar-nav { flex: 1; padding: 12px 10px; }
.nav-section { margin-bottom: 20px; }
.nav-section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 0 6px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: var(--trans); color: var(--text2); font-size: 13px; font-weight: 400; position: relative; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(255,107,0,.12); color: var(--accent); font-weight: 500; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; height: 60%; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }

.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }

/* MAIN CONTENT */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 56px; min-height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; }
.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
.topbar-subtitle { font-size: 12px; color: var(--text2); }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ─── VIEWS ─────────────────────────────────────────────── */
.view { display: none; animation: fadeIn .25s ease; }
.view.active { display: block; }

/* ─── CARDS & STATS ─────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.stat-card-label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.stat-card-value { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-accent { border-left: 3px solid var(--accent); }
.stat-green { border-left: 3px solid var(--green); }
.stat-yellow { border-left: 3px solid var(--yellow); }
.stat-blue { border-left: 3px solid var(--blue); }

/* ─── TABLE ─────────────────────────────────────────────── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.card-title { font-size: 14px; font-weight: 600; flex: 1; }
.card-body { padding: 20px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
.mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }

/* STATUS BADGES */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.badge-draft    { background: rgba(110,118,129,.15); color: var(--text2); }
.badge-pending  { background: rgba(210,153,34,.15); color: var(--yellow); }
.badge-approved { background: rgba(63,185,80,.15); color: var(--green); }
.badge-rejected { background: rgba(248,81,73,.15); color: var(--red); }
.badge-travel   { background: rgba(56,139,253,.15); color: var(--blue); }
.badge-proof    { background: rgba(163,113,247,.15); color: var(--purple); }
.badge-closed   { background: rgba(63,185,80,.08); color: #6e7681; }
.badge-orange   { background: rgba(255,107,0,.15); color: var(--accent); }

/* FORM */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.form-section-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; padding: 6px 0; margin: 20px 0 12px; border-bottom: 1px solid var(--border); }
.budget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
.budget-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.budget-item label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; }
.budget-item input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; padding: 4px 0; outline: none; transition: var(--trans); }
.budget-item input:focus { border-color: var(--accent); }
.total-box { background: rgba(255,107,0,.08); border: 1px solid rgba(255,107,0,.25); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
.total-box span { font-size: 13px; color: var(--text2); }
.total-box strong { font-size: 18px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); animation: fadeIn .2s; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); animation: fadeUp .25s ease; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* DETAIL ROW */
.detail-row { display: flex; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.detail-row:last-child { border-bottom: none; }
.detail-label { font-size: 12px; color: var(--text2); width: 130px; flex-shrink: 0; }
.detail-value { font-size: 13px; font-weight: 500; }

/* ALERT */
.alert { padding: 12px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.alert-warn { background: rgba(210,153,34,.12); border: 1px solid rgba(210,153,34,.3); color: #e3b341; }
.alert-info { background: rgba(56,139,253,.1); border: 1px solid rgba(56,139,253,.25); color: #79c0ff; }
.alert-success { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.25); color: #56d364; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* TOAST */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 13px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px; min-width: 280px; animation: slideIn .3s ease; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--red); }
.toast.info    { border-left: 3px solid var(--blue); }

/* LOADING */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 300; }
.loading-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px 36px; display: flex; align-items: center; gap: 16px; font-size: 14px; }

/* TABS */
.tabs { display: flex; gap: 2px; background: var(--bg3); border-radius: 8px; padding: 3px; width: fit-content; margin-bottom: 20px; }
.tab { padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: var(--trans); }
.tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.3); }

/* FILTER ROW */
.filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-row input, .filter-row select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: var(--trans); }
.filter-row input:focus, .filter-row select:focus { border-color: var(--accent); }
.filter-row input[type="search"] { min-width: 200px; }

/* ANTICIPO STATUS */
.anticipo-bar { background: var(--bg3); border-radius: 6px; height: 6px; margin-top: 4px; overflow: hidden; }
.anticipo-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width .4s ease; }

/* ─── ANIMATIONS ────────────────────────────────────────── */
@keyframes fadeIn  { from { opacity: 0 }        to { opacity: 1 } }
@keyframes fadeUp  { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px) } to { opacity: 1; transform: none } }
@keyframes spin    { to { transform: rotate(360deg) } }

/* ─── RESPONSIVE ─────────────────────────────────────────── */

/* Tablet horizontal (≤1024px) */
@media (max-width: 1024px) {
  .sidebar { width: 200px; min-width: 200px; }
  .content { padding: 16px; }
}

/* Móvil y tablet vertical (≤768px) */
@media (max-width: 768px) {

  /* ── Layout ── */
  #app { height: 100svh; }
  .layout { position: relative; }

  /* ── Sidebar como drawer con transform ── */
  .sidebar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    transform: translateX(-100%) !important;
    width: 78vw !important;
    max-width: 280px !important;
    min-width: unset !important;
    height: 100svh !important;
    z-index: 300 !important;
    transition: transform .28s cubic-bezier(.4,0,.2,1) !important;
    overflow-y: auto !important;
    background: var(--bg2) !important;
  }
  .sidebar.open {
    transform: translateX(0) !important;
    box-shadow: 8px 0 32px rgba(0,0,0,.7) !important;
  }

  /* ── Overlay ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 299;
  }
  .sidebar-overlay.active { display: block !important; }

  /* ── Main ocupa TODO el ancho siempre ── */
  .main {
    position: relative;
    width: 100% !important;
    min-width: 0 !important;
    flex: 1 1 100% !important;
    max-width: 100vw !important;
    overflow: hidden;
    display: flex !important;
    flex-direction: column !important;
  }

  /* ── Topbar ── */
  .topbar { padding: 0 10px; gap: 8px; height: 50px; min-height: 50px; }
  .topbar-title { font-size: 14px; }
  .topbar-subtitle { display: none; }
  #btn-menu { display: flex !important; }
  #topbar-date { font-size: 11px; }

  /* ── Contenido ── */
  .content { padding: 12px; flex: 1; overflow-y: auto; }

  /* ── Stats ── */
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { padding: 12px; }
  .stat-card-value { font-size: 18px; }
  .stat-card-label { font-size: 10px; }
  .stat-card-sub { font-size: 10px; }

  /* ── Formularios ── */
  .form-row { grid-template-columns: 1fr; gap: 10px; }
  .form-row-3 { grid-template-columns: 1fr; gap: 10px; }

  /* ── Tablas ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 520px; }
  td, th { padding: 8px 10px; font-size: 12px; }

  /* ── Fork ── */
  .fork { grid-template-columns: 1fr; }

  /* ── Login ── */
  .login-card { width: calc(100vw - 32px); max-width: 380px; padding: 24px 20px; }

  /* ── Toast ── */
  #toast-container { left: 10px; right: 10px; bottom: 10px; }
  .toast { min-width: unset; }
}

/* Móvil pequeño (≤480px) */
@media (max-width: 480px) {
  .content { padding: 10px; }
  #topbar-date { display: none; }
  .card-header { flex-wrap: wrap; gap: 8px; }
  .modal { width: 96vw !important; }
  .modal-body { padding: 12px 14px; }
  .modal-footer { flex-wrap: wrap; gap: 6px; }
  .modal-footer .btn { flex: 1; justify-content: center; min-width: 100px; }
  .filter-row { flex-direction: column; }
  .filter-row input, .filter-row select { width: 100%; }
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px) } to { opacity: 1; transform: none } }
@keyframes spin    { to { transform: rotate(360deg) } }

@media print {
  .sidebar, .topbar, #btn-xlsx, #btn-pdf, .card-body, .filter-row,
  #dev-role-switcher, .sidebar-overlay { display: none !important; }
  .main { width: 100% !important; }
  .content { padding: 0 !important; overflow: visible !important; }
  #app { height: auto !important; overflow: visible !important; }
  .layout { height: auto !important; }

async function cargarUsuarioM365(account){
  try {
    await msalApp.initialize();
    const status = document.getElementById('login-status');
    if(status) status.textContent = 'Verificando permisos...';

    // Token para Graph (obtener grupos del usuario)
    const graphResp = await msalApp.acquireTokenSilent({
      scopes: ['User.Read','GroupMember.Read.All'],
      account
    });
    const graphToken = graphResp.accessToken;

    // Obtener grupos del usuario
    const gruposResp = await fetch(
      'https://graph.microsoft.com/v1.0/me/memberOf?$select=displayName',
      { headers: { Authorization: `Bearer ${graphToken}` } }
    );
    const gruposData = await gruposResp.json();
    const misGrupos  = (gruposData.value || []).map(g => g.displayName);

    // Determinar rol según grupos (el primero que coincida gana)
    let rolDetectado = 'empleado';
    for(const [grupo, rol] of Object.entries(GRUPOS_ROLES)){
      if(misGrupos.includes(grupo)){ rolDetectado = rol; break; }
    }

    // Token para SharePoint
    const spResp = await msalApp.acquireTokenSilent({
      scopes: SP_SCOPES,
      account
    }).catch(()=> null);
    if(spResp) SP_TOKEN = spResp.accessToken;

    // Activar la app
    const nombre = account.name || account.username.split('@')[0];
    const email  = account.username;
    doLoginM365({ name: nombre, email, role: rolDetectado });

  } catch(e){
    const status = document.getElementById('login-status');
    if(status){ status.textContent = 'Error al verificar permisos. Contacta a TI.'; }
    const btn = document.getElementById('btn-login');
    if(btn){ btn.disabled = false; }
    console.error('cargarUsuarioM365:', e);
  }
}

// ─── SHAREPOINT REST API ──────────────────────────────────────
async function spGet(endpoint){
  const r = await fetch(`${SP_SITE}/_api/${endpoint}`, {
    headers: {
      'Authorization': `Bearer ${SP_TOKEN}`,
      'Accept': 'application/json;odata=nometadata'
    }
  });
  if(!r.ok) throw new Error(`SP GET error: ${r.status}`);
  return r.json();
}

async function spPost(endpoint, body){
  // Obtener digest para escritura
  const digestResp = await fetch(`${SP_SITE}/_api/contextinfo`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SP_TOKEN}`,
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json'
    }
  });
  const digestData = await digestResp.json();
  const digest = digestData.FormDigestValue;

  const r = await fetch(`${SP_SITE}/_api/${endpoint}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SP_TOKEN}`,
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json',
      'X-RequestDigest': digest,
      'IF-MATCH': '*'
    },
    body: JSON.stringify(body)
  });
  if(!r.ok){ const t = await r.text(); throw new Error(`SP POST error: ${r.status} — ${t}`); }
  return r.status === 204 ? {} : r.json();
}

async function spPatch(endpoint, body){
  const digestResp = await fetch(`${SP_SITE}/_api/contextinfo`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SP_TOKEN}`,
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json'
    }
  });
  const digest = (await digestResp.json()).FormDigestValue;
  const r = await fetch(`${SP_SITE}/_api/${endpoint}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SP_TOKEN}`,
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json',
      'X-RequestDigest': digest,
      'X-HTTP-Method': 'MERGE',
      'IF-MATCH': '*'
    },
    body: JSON.stringify(body)
  });
  if(!r.ok){ const t = await r.text(); throw new Error(`SP PATCH error: ${r.status} — ${t}`); }
  return {};
}

async function spUpdateEstado(folioId, campos){
  try {
    // Buscar el item por FolioID
    const q = await spGet(`web/lists/getbytitle('Viaticos_Solicitudes')/items?$filter=FolioID eq '${folioId}'&$select=Id`);
    if(!q.value || q.value.length === 0) return { ok:false, error:'Folio no encontrado' };
    const itemId = q.value[0].Id;
    await spPatch(`web/lists/getbytitle('Viaticos_Solicitudes')/items(${itemId})`, campos);
    return { ok: true };
  } catch(e){ console.error('spUpdateEstado:', e); return { ok:false, error:e.message }; }
}

   API — usa SharePoint en producción, localStorage como fallback
═══════════════════════════════════════════════════════ */
async function apiCall(action, data={}){
  try {
    if(action === 'saveSolicitud')
      return await spSaveSolicitud(data.solicitud);
    if(action === 'updateEstado')
      return await spUpdateEstado(data.id, buildEstadoCampos(data));
    if(action === 'registrarAnticipo')
      return await spUpdateEstado(data.id, {
        MontoEntregado:     Number(data.monto),
        FechaAnticipo:      data.fecha,
        MetodoAnticipo:     data.metodo,
        ReferenciaAnticipo: data.ref,
        Estado:             'en_viaje'
      });
    if(action === 'cerrarFolio')
      return await spUpdateEstado(data.id, {
        Estado:      'cerrado',
        SaldoFinal:  data.saldo,
        FechaCierre: today(),
        CerradoPor:  data.cerradoPor
      });
    if(action === 'enviarComprobacion')
      return await spUpdateEstado(data.id, { Estado: 'comp_enviada_gerente' });
    return { ok: true };
  } catch(e){
    console.warn('apiCall error:', e);
    return { ok: false, error: e.message };
  }
}

function buildEstadoCampos(data){
  const campos = { Estado: data.estado };
  if(data.autorizadoPor){
    if(data.rol === 'gerente'){ campos.AprobadoGerente = data.autorizadoPor; campos.ComentarioGerente = data.comentario||''; }
    else if(data.rol === 'director'){ campos.AprobadoDirector = data.autorizadoPor; }
    else { campos.ValidadoAdmon = data.autorizadoPor; campos.ComentarioAdmon = data.comentario||''; }
  }
  if(data.rechazadoPor){ campos.RechazadoPor = data.rechazadoPor; campos.MotivoRechazo = data.comentario||''; }
  if(data.validadoPor){  campos.ValidadoAdmon = data.validadoPor; }
  return campos;
}

async function loadSolicitudes(){
  showLoading('Cargando solicitudes...');
  try {
    if(SP_TOKEN){
      allSolicitudes = await spGetSolicitudes(USER.email, USER.role);
      // Sincronizar con localStorage
      allSolicitudes.forEach(s => saveSolicitudLocal(s));
    } else {
      allSolicitudes = getSolicitudesLocal();
    }
  } catch(e){
    allSolicitudes = getSolicitudesLocal();
  }
  hideLoading();
  updateBadges();
  renderCurrentView();
}

// localStorage fallback
function getSolicitudesLocal(){
  return JSON.parse(localStorage.getItem('viaticos_data') || '[]');
}
function saveSolicitudLocal(s){
  const data = getSolicitudesLocal();
  const idx = data.findIndex(d=>d.id===s.id);
  if(idx>=0) data[idx]=s; else data.push(s);
  localStorage.setItem('viaticos_data', JSON.stringify(data));
}

function buildSidebar(role){

        badge.textContent = '0';
        el.appendChild(badge);
      }

      // Hover effects
      el.addEventListener('mouseenter', () => {
        if(!el.classList.contains('active')){
          el.style.background = 'rgba(255,255,255,.06)';
          el.style.color = '#e6edf3';

        if(!el.classList.contains('active')){
          el.style.background = 'transparent';

function updateBadges(){
  const pendGerente   = allSolicitudes.filter(s=>s.estado==='pendiente_gerente').length;
  const pendDir       = allSolicitudes.filter(s=>s.estado==='pendiente_director').length;
  const pendAdmon     = allSolicitudes.filter(s=>s.estado==='pendiente_administracion').length;
  const compGerente   = allSolicitudes.filter(s=>s.estado==='comp_enviada_gerente').length;
  const compDirector  = allSolicitudes.filter(s=>s.estado==='comp_enviada_gerente' && 
    ['gerente'].includes(allSolicitudes.find(x=>x.email===s.email)?.rol || 'empleado')).length;
  const compAdmon     = allSolicitudes.filter(s=>s.estado==='comp_enviada_admon').length;
  const vencidos      = allSolicitudes.filter(s=>s.estado==='vencido_comprobacion').length;
  const descuentos    = allSolicitudes.filter(s=>s.estado==='descuento_nomina').length;
  const set = (id, val) => { const el=document.getElementById('badge-'+id); if(el) el.textContent=val; };
  set('gerente',      pendGerente);
  set('director',     pendDir);
  set('admon',        pendAdmon);
  set('comp-gerente', compGerente);
  set('comp-director',compGerente);
  set('comp-admon',   compAdmon);
  set('comp-sin-cuenta', allSolicitudes.filter(s=>s.esSinCuenta && s.estado==='comp_enviada_gerente').length);
  // Jazmín — solicitudes aprobadas que requieren logística (hospedaje o vuelo) y no está completada
  set('logistica', allSolicitudes.filter(s=>
    necesitaLogistica(s) &&
    ['aprobado','en_viaje','pendiente_comprobacion'].includes(s.estado) &&
    !esLogisticaCompletada(s)
  ).length);
  set('rh',           vencidos + descuentos);
}

let currentView = '';
function navigateTo(view){
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => {
    const isActive = el.dataset.view === view;
    el.classList.toggle('active', isActive);
    const lbl = el.querySelector('span:nth-child(2)');
    if(isActive){
      el.style.background = 'rgba(255,107,0,.12)';
      if(lbl) lbl.style.color = '#ff6b00';
    } else {
      el.style.background = 'transparent';
      if(lbl) lbl.style.color = '#c9d1d9';
    }
  });
  closeSidebar();
  renderView(view);
}

        <table id="tbl-mine">
          <thead><tr><th>Folio</th><th>Destino</th><th>Motivo</th><th>Salida</th><th>Regreso</th><th>Monto</th><th>Estado</th><th></th></tr></thead>
          <tbody id="tbody-mine">${renderRowsMine(mine)}</tbody>
        </table>
        ${mine.length===0 ? '<div class="empty-state"><div class="icon">✈️</div><h3>Sin solicitudes</h3><p>Crea tu primera solicitud de viáticos.</p></div>' : ''}
      </div>
    </div>`;
}

function renderRowsMine(list){
  return list.map(s => {
    const gastos = getGastosSolicitud(s.id);
    const totalComp = gastos.reduce((a,g)=>a+Number(g.monto||0),0);
    const pendiente = Number(s.montoEntregado||0) - totalComp;
    const puedeComprobar = ['en_viaje','pendiente_comprobacion'].includes(s.estado);
    const compEstado = puedeComprobar && gastos.length > 0
      ? `<span style="font-size:10px;color:var(--green)">✓ ${gastos.length} gasto${gastos.length>1?'s':''}</span>`
      : puedeComprobar ? `<span style="font-size:10px;color:var(--yellow)">⏳ Sin gastos</span>` : '';
    return `
    <tr>
      <td class="mono" style="font-weight:600">${s.id}</td>
      <td><strong>${s.sucursal||s.destino}</strong></td>
      <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)">${s.motivo}</td>
      <td>${fmtDate(s.fechaSalida)}</td>
      <td>${fmtDate(s.fechaRegreso)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${fmtMXN(s.montoTotal)}</td>
      <td>${badge(s.estado)}<br>${compEstado}</td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px" onclick="verDetalle('${s.id}')">👁 Ver</button>
          ${puedeComprobar ? `<button class="btn btn-primary" style="padding:5px 10px;font-size:12px" onclick="navigateToComprobacion('${s.id}')">🧾 Comprobar</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:30px">Sin resultados</td></tr>';
}

function filterMine(q){
  const mine = allSolicitudes.filter(s=>s.email===USER.email);
  const fil = mine.filter(s => JSON.stringify(s).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('tbody-mine').innerHTML = renderRowsMine(fil);
}
function filterMineStatus(v){
  const mine = allSolicitudes.filter(s=>s.email===USER.email);
  const fil = v ? mine.filter(s=>s.estado===v) : mine;
  document.getElementById('tbody-mine').innerHTML = renderRowsMine(fil);
}

}

function buildSucursalOptions(){
  // Zonas normales como optgroup
  const zonasNormales = ['z1','z3','z4'];
  const opts = zonasNormales
    .filter(zid => ZONAS[zid] && SUCURSALES[zid])
    .map(zid => `
      <optgroup label="${ZONAS[zid].nombre}">
        ${SUCURSALES[zid].map(s=>`<option value="${s}">${s}</option>`).join('')}
      </optgroup>`).join('');
  // Otro Destino como opción separada al final
  return opts + `<option value="Otro Destino (Externo)">🌐 Otro Destino (Externo)</option>`;
}

/* Cuando cambia la sucursal seleccionada */
function onSucursalChange(){
  const suc = document.getElementById('f-sucursal').value;
  const fgOtro = document.getElementById('fg-destino-otro');

  if(suc === '__otro__'){
    fgOtro.style.display = 'block';
    document.getElementById('zona-card').style.display = 'none';
    document.getElementById('logistica-panel').innerHTML = `<p style="font-size:13px;color:var(--text2)">Para destinos externos, el Asistente Ejecutivo evaluará si aplica gestión de hospedaje o vuelos.</p>`;
    resetBudgetLabels();
    return;
  }
  fgOtro.style.display = 'none';

  const zona = getZonaDeSucursal(suc);
  if(!zona){ document.getElementById('zona-card').style.display='none'; return; }

  // Mostrar tarjeta de zona
  const zc = document.getElementById('zona-card');
  zc.style.display = 'block';
  zc.style.borderColor = zona.colorBorder;
  zc.style.background = zona.colorBg;

  document.getElementById('zona-badge').textContent = zona.id.toUpperCase();
  document.getElementById('zona-badge').style.background = zona.colorBg;
  document.getElementById('zona-badge').style.color = zona.color;
  document.getElementById('zona-badge').style.borderColor = zona.colorBorder;
  document.getElementById('zona-nombre').textContent = zona.nombre;
  document.getElementById('zona-km').textContent = zona.km + ' · ' + zona.tiempo;

  const L = zona.limites;
  document.getElementById('zona-limites-grid').innerHTML = `
    <div style="background:var(--bg2);border-radius:8px;padding:10px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Alim. día completo</div>
      <div style="font-size:15px;font-weight:700">$${L.alimDiaTotal.toLocaleString('es-MX')}</div>
      <div style="font-size:11px;color:var(--text2)">Máx. $${L.alimDiaSinCFDI} sin factura (Art.93 LISR)</div>
    </div>
    <div style="background:var(--bg2);border-radius:8px;padding:10px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Alim. medio día</div>
      <div style="font-size:15px;font-weight:700">$${L.alimMedioTotal.toLocaleString('es-MX')}</div>
      <div style="font-size:11px;color:var(--text2)">Máx. $${L.alimMedioSinCFDI} sin factura</div>
    </div>
    <div style="background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.2);border-radius:8px;padding:10px">
      <div style="font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Hospedaje</div>
      <div style="font-size:13px;font-weight:600;color:var(--blue)">Asistente de Dirección</div>
      <div style="font-size:11px;color:var(--text2)">Factura directa a empresa</div>
    </div>
    ${zona.vueloGestionado ? `
    <div style="background:rgba(56,139,253,.08);border:1px solid rgba(56,139,253,.2);border-radius:8px;padding:10px">
      <div style="font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Vuelos</div>
      <div style="font-size:13px;font-weight:600;color:var(--blue)">Asistente de Dirección</div>
      <div style="font-size:11px;color:var(--text2)">Factura directa a empresa</div>
    </div>` : ''}
    <div style="background:var(--bg2);border-radius:8px;padding:10px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Transporte local / día</div>
      <div style="font-size:15px;font-weight:700">$${L.transporteLocal.toLocaleString('es-MX')}</div>
      <div style="font-size:11px;color:var(--text2)">Uber / DiDi / InDriver</div>
    </div>`;

  document.getElementById('zona-avisos').innerHTML = zona.reglas.map(r=>
    `<div style="font-size:12px;color:var(--text2);display:flex;gap:6px"><span style="color:${zona.color}">▸</span>${r}</div>`
  ).join('');

  // Actualizar etiquetas del presupuesto
  document.getElementById('lbl-alim').textContent = `máx. $${L.alimDiaTotal}/día`;
  document.getElementById('lbl-trans').textContent = `máx. $${L.transporteLocal}/día`;

  // Hospedaje: ocultar si es gestionado por asistente
  const biHosp = document.getElementById('bi-hospedaje');
  if(zona.hospedajeGestionado){
    document.getElementById('lbl-hospedaje').textContent = '';
    biHosp.style.opacity = '0.4';
    biHosp.style.pointerEvents = 'none';
    biHosp.title = 'El hospedaje es gestionado por el Asistente Ejecutivo';
    document.getElementById('b-hospedaje').value = '0';
  } else {
    document.getElementById('lbl-hospedaje').textContent = `máx. $${L.hospedajeNoche}/noche`;
    biHosp.style.opacity = '1';
    biHosp.style.pointerEvents = 'auto';
    biHosp.title = '';
  }

  // Panel de logística
  renderLogisticaPanel(zona);

  // Mostrar check de transporte empresa para zonas internas
  const checkEmpresa = document.getElementById('check-transporte-empresa');
  if(checkEmpresa){
    const esZonaInterna = ['z1','z3','z4'].includes(zona.id);
    checkEmpresa.style.display = esZonaInterna ? 'block' : 'none';
    // Reset checkbox al cambiar de sucursal
    const cb = document.getElementById('cb-transporte-empresa');
    if(cb) cb.checked = false;
    const biTrans = document.getElementById('bi-trans');
    if(biTrans){ biTrans.style.opacity='1'; biTrans.style.pointerEvents='auto'; }
  }

  calcAutoEstimacion();
  calcTotal();

// ── Cambio 6: Calcular estimación automática según zona y horario ──
function calcAutoEstimacion(){
  const suc     = document.getElementById('f-sucursal')?.value;
  const horaSal = document.getElementById('f-hora-salida')?.value  || '07:00';
  const horaReg = document.getElementById('f-hora-regreso')?.value || '18:00';
  const zona    = suc && suc !== '__otro__' ? getZonaDeSucursal(suc) : null;
  if(!zona) return;

  const dias        = getDias();
  const L           = zona.limites;
  const horaSalH    = parseInt(horaSal.split(':')[0]);
  const horaRegH    = parseInt(horaReg.split(':')[0]);
  const usaEmpresa  = document.getElementById('cb-transporte-empresa')?.checked || false;

  // Regla: salida antes de 8am = día completo; después = medio día
  const primerDiaCompleto = horaSalH < 8;
  // Regla: regreso después de 14:00 = día completo; antes = medio día
  const ultimoDiaCompleto = horaRegH >= 14;

  // ── Alimentación por día ──
  let totalAlim = 0;
  if(dias === 1){
    totalAlim = primerDiaCompleto ? L.alimDiaTotal : L.alimMedioTotal;
  } else {
    totalAlim += primerDiaCompleto ? L.alimDiaTotal : L.alimMedioTotal;
    if(dias > 2) totalAlim += L.alimDiaTotal * (dias - 2);
    totalAlim += ultimoDiaCompleto ? L.alimDiaTotal : L.alimMedioTotal;
  }

  // ── Transporte — solo si no usa vehículo empresa ──
  const totalTrans = usaEmpresa ? 0 : L.transporteLocal * dias;

  // Llenar campos — siempre actualiza con la estimación
  const bAlim  = document.getElementById('b-alim');
  const bTrans = document.getElementById('b-trans');
  if(bAlim)  bAlim.value  = totalAlim;
  if(bTrans) bTrans.value = totalTrans;

  // Mostrar alerta informativa
  const avisoEl = document.getElementById('budget-avisos');
  if(avisoEl){
    const tipoPrimerDia  = primerDiaCompleto  ? 'día completo' : 'medio día';
    const tipoUltimoDia  = ultimoDiaCompleto  ? 'día completo' : 'medio día';
    avisoEl.innerHTML = `<div class="alert alert-info" style="margin-bottom:8px">
      📊 <strong>Estimación automática — ${dias} día${dias>1?'s':''}:</strong>
      Salida ${horaSalH < 8 ? 'antes' : 'después'} de las 8:00 a.m. → <strong>${tipoPrimerDia}</strong> en día 1.
      ${dias > 1 ? `Regreso ${horaRegH >= 14 ? 'después' : 'antes'} de las 14:00 → <strong>${tipoUltimoDia}</strong> en el último día.` : ''}
      ${dias > 2 ? `<strong>${dias-2} día${dias-2>1?'s':''} intermedio${dias-2>1?'s':''}</strong> = día completo.` : ''}
      <br>
      🍽️ Alimentación: <strong>${fmtMXN(totalAlim)}</strong>
      ${usaEmpresa ? ' · 🚐 Transporte: <strong>Vehículo empresa</strong>' : ` · 🚗 Transporte local: <strong>${fmtMXN(totalTrans)}</strong>`}
      <span style="font-size:11px;color:var(--text2);display:block;margin-top:4px">Puedes ajustar los montos manualmente si es necesario.</span>
    </div>`;
  }
  calcTotal();
}

  }
  if(bTrans && usaEmpresa) bTrans.value = 0;

function getDias(){
  const s = document.getElementById('f-salida')?.value;
  const r = document.getElementById('f-regreso')?.value;
  if(!s||!r) return 1;
  const diff = Math.round((new Date(r)-new Date(s))/(1000*60*60*24));
  return Math.max(1, diff+1);
}
function calcTotal(){
  const ids = ['b-hospedaje','b-alim','b-trans','b-comb','b-otros'];
  const total = ids.reduce((s,id)=>s+Number(document.getElementById(id)?.value||0),0);
  const el = document.getElementById('total-display');
  if(el) el.textContent = fmtMXN(total);

  // Validar contra límites de zona
  const suc = document.getElementById('f-sucursal')?.value;
  const zona = suc && suc!=='__otro__' ? getZonaDeSucursal(suc) : null;
  const avisos = document.getElementById('exceso-avisos');
  if(!avisos) return total;
  avisos.innerHTML = '';

  if(zona){
    const L = zona.limites;
    const dias = getDias();
    const alim = Number(document.getElementById('b-alim')?.value||0);
    const trans = Number(document.getElementById('b-trans')?.value||0);
    const hosp  = Number(document.getElementById('b-hospedaje')?.value||0);
    const maxAlim  = L.alimDiaTotal * dias;
    const maxTrans = L.transporteLocal * dias;

    if(alim > maxAlim)
      avisos.insertAdjacentHTML('beforeend',`<div class="alert alert-warn">⚠️ Alimentación ($${alim.toLocaleString('es-MX')}) excede el límite de $${maxAlim.toLocaleString('es-MX')} (${dias} día${dias>1?'s':''} × $${L.alimDiaTotal}). Requiere autorización especial de Dirección.</div>`);
    if(trans > maxTrans)
      avisos.insertAdjacentHTML('beforeend',`<div class="alert alert-warn">⚠️ Transporte ($${trans.toLocaleString('es-MX')}) excede el límite de $${maxTrans.toLocaleString('es-MX')} (${dias} día${dias>1?'s':''} × $${L.transporteLocal}). Requiere autorización especial.</div>`);
    if(hosp > 0)
      avisos.insertAdjacentHTML('beforeend',`<div class="alert alert-warn">⚠️ El hospedaje es gestionado por el Asistente de Dirección. No debe incluirse en la estimación del anticipo.</div>`);
  }
  return total;
}

async function enviarSolicitud(){
  const primerEstado = USER.role === 'gerente' ? 'pendiente_director' : 'pendiente_gerente';
  const obj = buildSolicitudObj(primerEstado);
  if(!obj.destino){ toast('Selecciona una sucursal o destino', 'error'); return; }
  if(!obj.motivo){ toast('Completa el motivo del viaje', 'error'); return; }
  if(!obj.objetivo){ toast('Completa el objetivo del viaje (requerido por política)', 'error'); return; }
  if(!obj.centroCosto){ toast('Selecciona el centro de costos', 'error'); return; }
  if(obj.montoTotal <= 0){ toast('La estimación debe ser mayor a $0', 'error'); return; }
  if(!obj.horaSalida){ toast('Ingresa la hora posible de salida', 'error'); return; }
  if(!obj.horaRegreso){ toast('Ingresa la hora posible de regreso', 'error'); return; }

  showLoading('Guardando en SharePoint...');

  // Subir bitácora si existe
  const bitacoraFile = document.getElementById('f-bitacora')?.files?.[0];
  if(bitacoraFile){
    // Guardar nombre como fallback inmediato
    obj.archivosBitacora = bitacoraFile.name;
    const url = await subirBitacoraSP(bitacoraFile, obj.id);
    if(url){
      obj.archivosBitacora = url; // URL completa de SharePoint
    }
  }

  const res = await apiCall('saveSolicitud', { solicitud: obj });
  saveSolicitudLocal(obj);

  // Si la bitácora subió correctamente, actualizar ArchivosBitacora en SP por separado
  if(bitacoraFile && obj.archivosBitacora && obj.archivosBitacora.startsWith('/')){
    await spUpdateEstado(obj.id, { ArchivosBitacora: obj.archivosBitacora }).catch(()=>{});
  }

  allSolicitudes = getSolicitudesLocal();
  hideLoading();
  if(res.ok){
    toast(`Solicitud ${obj.id} enviada a ${primerEstado==='pendiente_director'?'Director General':'Gerente de Área'}`, 'success');
  } else {
    toast(`Solicitud ${obj.id} guardada localmente (sin conexión)`, 'info');
  }
  navigateTo('mis-solicitudes');
}

// ── Subir bitácora a biblioteca Viaticos_Bitacoras ──────────
async function subirBitacoraSP(archivo, folioId){
  if(!SP_TOKEN || !archivo){ console.warn('subirBitacoraSP: sin token o archivo'); return null; }
  try {
    const nombre = `Bitacora_${folioId}_${Date.now()}${archivo.name.substring(archivo.name.lastIndexOf('.'))}`;

    // Obtener digest
    const digestR = await fetch(`${SP_SITE}/_api/contextinfo`, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${SP_TOKEN}`, 'Accept':'application/json;odata=nometadata', 'Content-Type':'application/json' }
    });
    const digestData = await digestR.json();
    const digest = digestData.FormDigestValue;
    if(!digest){ console.error('subirBitacoraSP: sin digest'); return null; }

    // Subir directo a la raíz de la biblioteca (sin subcarpetas)
    const buf = await archivo.arrayBuffer();
    const upResp = await fetch(
      `${SP_SITE}/_api/web/lists(guid'd83d37f2-1e6c-4b0a-98d1-44bf2da2ef73')/RootFolder/Files/add(url='${encodeURIComponent(nombre)}',overwrite=true)`,
      { method:'POST', headers:{
        'Authorization':`Bearer ${SP_TOKEN}`,
        'Accept':'application/json;odata=nometadata',
        'X-RequestDigest':digest
      }, body: buf }
    );

    if(!upResp.ok){
      const err = await upResp.text();
      console.error('subirBitacoraSP upload error:', upResp.status, err);
      return null;
    }

    const upData = await upResp.json();
    const serverUrl = upData.ServerRelativeUrl || null;
    console.log('subirBitacoraSP OK:', serverUrl);

    // Actualizar columnas FolioID y EmailEmpleado (best-effort, no bloquea)
    try {
      const itemUrl = upData.ListItemAllFields?.__deferred?.uri || null;
      if(itemUrl){
        const d2 = await (await fetch(`${SP_SITE}/_api/contextinfo`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${SP_TOKEN}`,'Accept':'application/json;odata=nometadata','Content-Type':'application/json'}
        })).json();
        await fetch(itemUrl, {
          method:'POST',
          headers:{
            'Authorization':`Bearer ${SP_TOKEN}`,
            'Accept':'application/json;odata=nometadata',
            'Content-Type':'application/json;odata=nometadata',
            'X-RequestDigest': d2.FormDigestValue,
            'IF-MATCH':'*',
            'X-HTTP-Method':'MERGE'
          },
          body: JSON.stringify({ FolioID: folioId, EmailEmpleado: USER.email })
        });
      }
    } catch(e){ console.warn('Metadata bitácora skip:', e.message); }

    return serverUrl;

  } catch(e){
    console.error('subirBitacoraSP exception:', e);
    return null;
  }
}

              <div style="font-weight:600;color:var(--purple);margin-bottom:6px">✈️ ${s.aerolineaNombre} — Vuelo ${s.vueloNumero||'—'}</div>
              <div style="font-size:12px;color:var(--text2)">Fecha: <strong style="color:var(--text)">${fmtDate(s.vueloFecha)}</strong></div>
            </div>` : ''}
          </div>` : ''}
          ${s.comentarioJefe?`<div style="margin-top:10px" class="alert alert-warn">💬 Jefe: ${s.comentarioJefe}</div>`:''}
          ${s.comentarioRH?`<div style="margin-top:6px" class="alert alert-warn">💬 RH: ${s.comentarioRH}</div>`:''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
          ${canSend?`<button class="btn btn-primary" onclick="closeModal();enviarDesdeDetalle('${s.id}')">📤 Enviar a autorización</button>`:''}
        </div>
      </div>
    </div>`);
}

async function enviarDesdeDetalle(id){
  const idx = allSolicitudes.findIndex(s=>s.id===id);
  if(idx<0) return;
  const primerEstado = USER.role === 'gerente' ? 'pendiente_director' : 'pendiente_gerente';
  allSolicitudes[idx].estado = primerEstado;
  saveSolicitudLocal(allSolicitudes[idx]);
  await apiCall('updateEstado', { id, estado: primerEstado, comentario:'' });
  const destino = primerEstado === 'pendiente_director' ? 'Director General' : 'Gerente de Área';
  toast(`Solicitud enviada a ${destino}`, 'success');
  renderCurrentView();
}

function renderMisComprobantes(c){

function switchSolicitudComprobacion(id){
  const c = document.getElementById('content');
  c.dataset.selectedId = id;
  renderMisComprobantes(c);
}

function onTipoCompChange(){
  const tipo = document.getElementById('cg-tipo').value;
  const uuidGroup = document.getElementById('fg-uuid');
  uuidGroup.style.display = tipo === 'cfdi' ? 'block' : 'none';
  validarMontoComprobante();
}

function validarMontoComprobante(solId){
  const tipo  = document.getElementById('cg-tipo')?.value;
  const monto = Number(document.getElementById('cg-monto')?.value||0);
  const aviso = document.getElementById('aviso-monto-comprobante');
  if(!aviso) return;
  aviso.innerHTML = '';
  if(tipo === 'sin_cfdi' && monto > 0 && solId){
    const sol  = allSolicitudes.find(s=>s.id===solId);
    const zona = sol?.zonaId ? ZONAS[sol.zonaId] : null;
    const dias = sol?.duracion ? parseInt(sol.duracion)||1 : 1;
    const lim  = zona ? zona.limites.alimDiaSinCFDI * dias : 160*dias;
    const gastos  = getGastosSolicitud(solId);
    const yaAcum  = gastos.filter(g=>g.tipo_comp==='sin_cfdi'||g.tipo_comp==='ticket').reduce((a,g)=>a+Number(g.monto||0),0);
    if(yaAcum + monto > lim)
      aviso.innerHTML = `<div class="alert alert-warn" style="margin:0">⚠️ Con este gasto superarás el límite sin CFDI de $${lim.toLocaleString('es-MX')} (Art. 93 LISR). Acumulado: $${(yaAcum+monto).toLocaleString('es-MX')}.</div>`;
    else
      aviso.innerHTML = `<div class="alert alert-info" style="margin:0">ℹ️ Acumulado sin CFDI: $${(yaAcum+monto).toLocaleString('es-MX')} de $${lim.toLocaleString('es-MX')} permitidos.</div>`;
  }
}

// Storage de gastos por solicitud
function getGastosSolicitud(solId){
  return JSON.parse(localStorage.getItem(`gastos_${solId}`) || '[]');
}
function saveGastosSolicitud(solId, gastos){
  localStorage.setItem(`gastos_${solId}`, JSON.stringify(gastos));
}

// Cargar gastos desde SharePoint y guardar en localStorage para que todos los roles los vean
async function cargarGastosDeSP(solId){
  if(!SP_TOKEN) return;
  try {
    const r = await spGet(`web/lists/getbytitle('Viaticos_Gastos')/items?$filter=FolioID eq '${solId}'&$orderby=Id asc&$top=100`);
    if(!r.value || r.value.length === 0) return;
    const gastos = r.value.map(item => ({
      categoria:   item.Categoria  || '',
      tipo_comp:   item.TipoComp   || 'cfdi',
      monto:       Number(item.Monto || 0),
      fecha:       item.FechaGasto?.split('T')[0] || '',
      proveedor:   item.Proveedor  || '',
      uuid:        item.UUID       || '',
      descripcion: item.Descripcion|| '',
      archivoUrl:  item.ArchivoUrl || ''
    }));
    saveGastosSolicitud(solId, gastos);
  } catch(e){ console.warn('cargarGastosDeSP:', e); }
}

// ── Subir archivo a biblioteca Viaticos_Comprobantes ─────────
// GUID: 77dfdcf2-91f0-45fa-87ea-0e3b01edf869
async function subirArchivoSP(archivo, folioId, categoria){
  if(!SP_TOKEN || !archivo) return null;
  try {
    const nombre  = `${folioId}_${categoria.replace(/\s/g,'_')}_${Date.now()}${archivo.name.substring(archivo.name.lastIndexOf('.'))}`;

    // Digest
    const digestR = await fetch(`${SP_SITE}/_api/contextinfo`, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${SP_TOKEN}`, 'Accept':'application/json;odata=nometadata', 'Content-Type':'application/json' }
    });
    const digest = (await digestR.json()).FormDigestValue;
    if(!digest) return null;

    // Subir directo a la raíz usando GUID de la biblioteca
    const buf = await archivo.arrayBuffer();
    const upResp = await fetch(
      `${SP_SITE}/_api/web/lists(guid'77dfdcf2-91f0-45fa-87ea-0e3b01edf869')/RootFolder/Files/add(url='${encodeURIComponent(nombre)}',overwrite=true)`,
      { method:'POST', headers:{
        'Authorization':`Bearer ${SP_TOKEN}`,
        'Accept':'application/json;odata=nometadata',
        'X-RequestDigest':digest
      }, body: buf }
    );
    if(!upResp.ok){
      const err = await upResp.text();
      console.error('subirArchivoSP error:', upResp.status, err);
      return null;
    }
    const upData = await upResp.json();
    console.log('subirArchivoSP OK:', upData.ServerRelativeUrl);
    return upData.ServerRelativeUrl || null;
  } catch(e){ console.error('subirArchivoSP:', e); return null; }
}

// ── Guardar gasto en SharePoint Viaticos_Gastos ──────────────
async function spSaveGasto(solId, gasto){
  if(!SP_TOKEN) return;
  try {
    const digestR = await fetch(`${SP_SITE}/_api/contextinfo`, {
      method:'POST', headers:{ 'Authorization':`Bearer ${SP_TOKEN}`,
        'Accept':'application/json;odata=nometadata', 'Content-Type':'application/json' }
    });
    const digest = (await digestR.json()).FormDigestValue;
    await fetch(`${SP_SITE}/_api/web/lists/getbytitle('Viaticos_Gastos')/items`, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${SP_TOKEN}`, 'Accept':'application/json;odata=nometadata',
        'Content-Type':'application/json', 'X-RequestDigest':digest },
      body: JSON.stringify({
        Title:          `${solId}_${Date.now()}`,
        FolioID:        solId,
        EmailEmpleado:  USER.email,
        Categoria:      gasto.categoria,
        TipoComp:       gasto.tipo_comp,
        Monto:          Number(gasto.monto),
        FechaGasto:     gasto.fecha,
        Proveedor:      gasto.proveedor || '',
        UUID:           gasto.uuid || '',
        Descripcion:    gasto.descripcion || '',
        ArchivoUrl:     gasto.archivoUrl || ''
      })
    });
  } catch(e){ console.error('spSaveGasto:', e); }
}

async function agregarGasto(solId){
  const cat    = document.getElementById('cg-cat').value;
  const tipo   = document.getElementById('cg-tipo').value;
  const monto  = document.getElementById('cg-monto').value;
  const fecha  = document.getElementById('cg-fecha').value;
  const prov   = document.getElementById('cg-proveedor').value.trim();
  const uuid   = document.getElementById('cg-uuid')?.value.trim() || '';
  const desc   = document.getElementById('cg-desc').value.trim();
  const fileEl = document.getElementById('cg-archivo');
  const archivo = fileEl?.files?.[0] || null;

  if(!cat)  { toast('Selecciona la categoría', 'error'); return; }
  if(!tipo) { toast('Selecciona el tipo de comprobante', 'error'); return; }
  if(!monto || Number(monto)<=0) { toast('Ingresa un monto válido', 'error'); return; }
  if(!fecha){ toast('Selecciona la fecha del gasto', 'error'); return; }

  showLoading('Guardando comprobante...');
  let archivoUrl = '';
  if(archivo){
    toast('Subiendo archivo a SharePoint...', 'info');
    archivoUrl = await subirArchivoSP(archivo, solId, cat) || '';
  }

  const nuevoGasto = { categoria:cat, tipo_comp:tipo, monto:Number(monto), fecha, proveedor:prov, uuid, descripcion:desc, archivoUrl };
  const gastos = getGastosSolicitud(solId);
  gastos.push(nuevoGasto);
  saveGastosSolicitud(solId, gastos);

  // Guardar en SharePoint en paralelo (sin bloquear)
  spSaveGasto(solId, nuevoGasto);

  hideLoading();
  if(archivoUrl) toast(`Gasto y archivo guardados ✓`, 'success');

  renderMisComprobantes(c);
}

function eliminarGasto(solId, idx){
  const gastos = getGastosSolicitud(solId);
  gastos.splice(idx, 1);
  saveGastosSolicitud(solId, gastos);
  const c = document.getElementById('content');
  renderMisComprobantes(c);
}

async function enviarComprobacion(solId){
  const gastos = getGastosSolicitud(solId);
  if(gastos.length === 0){ toast('Agrega al menos un comprobante antes de enviar', 'error'); return; }
  const idx = allSolicitudes.findIndex(s=>s.id===solId);
  const sol = allSolicitudes[idx];

  // Si es sin cuenta → el Gerente ya está comprobando = va directo a Administración
  const nuevoEstado = (sol?.esSinCuenta && USER.role === 'gerente')
    ? 'comp_enviada_admon'
    : 'comp_enviada_gerente';

  if(idx>=0){
    allSolicitudes[idx].estado       = nuevoEstado;
    allSolicitudes[idx].gastos       = gastos;
    allSolicitudes[idx].fechaEnvioComp = today();
    if(nuevoEstado === 'comp_enviada_admon'){
      allSolicitudes[idx].voboGerente  = USER.name;
      allSolicitudes[idx].fechaVoBo    = today();
    }
    saveSolicitudLocal(allSolicitudes[idx]);
  }
  await spUpdateEstado(solId, nuevoEstado === 'comp_enviada_admon'
    ? { Estado:'comp_enviada_admon', VoBoGerente: USER.name, FechaVoBo: today() }
    : { Estado:'comp_enviada_gerente' }
  );
  updateBadges();
  const destino = nuevoEstado === 'comp_enviada_admon' ? `${ADMIN_NAME} (Administración)` : 'Gerente para VoBo';
  toast(`Comprobación enviada a ${destino}`, 'success');
  navigateTo('mis-solicitudes');
}

/* ═══════════════════════════════════════════════════════
   HELPERS — resumen de comprobación de un folio
═══════════════════════════════════════════════════════ */
function resumenComp(s){
  const g   = getGastosSolicitud(s.id);
  const tot = g.reduce((a,x)=>a+Number(x.monto||0),0);
  const sin = g.filter(x=>x.tipo_comp!=='cfdi').reduce((a,x)=>a+Number(x.monto||0),0);
  const ant = Number(s.montoEntregado||0);
  const sal = ant - tot;
  return { gastos:g, total:tot, sinCFDI:sin, anticipo:ant, saldo:sal, count:g.length };
}

function compResumenHtml(s){
  const r = resumenComp(s);
  return `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0;background:var(--bg3);border-radius:8px;padding:10px">
      <div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Anticipo</div>
        <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px">${fmtMXN(r.anticipo)}</div></div>
      <div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Comprobado</div>
        <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:var(--blue)">${fmtMXN(r.total)}</div>
        <div style="font-size:10px;color:var(--text2)">${r.count} comp. · sin CFDI: ${fmtMXN(r.sinCFDI)}</div></div>
      <div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Saldo</div>
        <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:${r.saldo>0?'var(--green)':r.saldo<0?'var(--red)':'var(--text2)'}">${fmtMXN(Math.abs(r.saldo))}</div>
        <div style="font-size:10px;color:var(--text2)">${r.saldo>0?'Reintegra emp.':r.saldo<0?'Empresa reembolsa':'Cuadrado'}</div></div>
      <div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Comprobantes</div>
        ${r.gastos.map(g=>`<div style="font-size:11px;color:var(--text2)">${g.categoria} · ${fmtMXN(g.monto)} · ${{'cfdi':'CFDI','ticket':'Ticket','sin_cfdi':'Sin comp.'}[g.tipo_comp]||g.tipo_comp}</div>`).join('')}
      </div>
    </div>`;
}

async function marcarDescuentoAplicado(id){
  const idx = allSolicitudes.findIndex(s=>s.id===id);
  if(idx>=0){
    allSolicitudes[idx].estado = 'cerrado';
    allSolicitudes[idx].fechaCierre = today();
    allSolicitudes[idx].cerradoPor = USER.name + ' (nómina)';
    saveSolicitudLocal(allSolicitudes[idx]);

  await apiCall('updateEstado',{id, estado:'cerrado', comentario:'Descuento aplicado en nómina', procesadoPor:USER.name});
  updateBadges();
  toast('Descuento marcado como aplicado. Folio cerrado.', 'success');
  renderDescuentosNomina(document.getElementById('content'));
}
function renderMiSaldo(c){
  const mine           = allSolicitudes.filter(s => s.email === USER.email);
  const conAnticipo    = mine.filter(s => Number(s.montoEntregado||0) > 0);

  const totalComp      = conAnticipo.reduce((a,s) => a + getGastosSolicitud(s.id).reduce((b,g)=>b+Number(g.monto||0),0), 0);
  const porComprobar   = Math.max(0, totalEntregado - totalComp);
  const enViaje        = mine.filter(s => s.estado === 'en_viaje').length;
  const vencidos       = mine.filter(s => s.estado === 'vencido_comprobacion').length;

  c.innerHTML = `
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card stat-accent">

        <div class="stat-card-sub">${conAnticipo.length} folio${conAnticipo.length!==1?'s':''} con anticipo</div>
      </div>

      <div class="stat-card" style="border-left:3px solid ${porComprobar>0?'var(--yellow)':'var(--green)'}">

        <div class="stat-card-value" style="font-size:20px;color:${porComprobar>0?'var(--yellow)':'var(--green)'}">${fmtMXN(porComprobar)}</div>
        <div class="stat-card-sub">${porComprobar>0?`Tienes ${DIAS_COMPROBACION} días hábiles para reportar`:'Todo comprobado ✓'}</div>
      </div>
      <div class="stat-card" style="border-left:3px solid ${vencidos>0?'var(--red)':'var(--text3)'}">
        <div class="stat-card-label">Viajes activos</div>
        <div class="stat-card-value" style="color:${vencidos>0?'var(--red)':'inherit'}">${enViaje}</div>
        <div class="stat-card-sub">${vencidos>0?`⚠️ ${vencidos} folio${vencidos>1?'s':''} vencido${vencidos>1?'s':''}`:'Sin alertas'}</div>
      </div>
    </div>

    ${vencidos>0?`<div class="alert alert-warn" style="margin-bottom:14px">⚠️ Tienes ${vencidos} folio${vencidos>1?'s':''} con comprobación vencida. Contacta a Administración.</div>`:''}

      <div class="card-header"><span class="card-title">Detalle por folio</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Folio</th><th>Destino</th><th>Anticipo</th><th>Comprobado</th><th>Pendiente</th><th>Referencia</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            ${conAnticipo.length ? conAnticipo.map(s=>{
              const comp  = getGastosSolicitud(s.id).reduce((a,g)=>a+Number(g.monto||0),0);
              const pend  = Math.max(0, Number(s.montoEntregado||0) - comp);
              const saldo = Number(s.montoEntregado||0) - comp;
              return `<tr>
                <td class="mono" style="font-weight:600">${s.id}</td>

                    `<button class="btn btn-primary" style="font-size:11px;padding:4px 9px" onclick="navigateToComprobacion('${s.id}')">🧾 Comprobar</button>`

                    ${saldo>0?'Reintegrar: ':'A tu favor: '}${fmtMXN(Math.abs(saldo))}</span>`:'<span style="font-size:11px;color:var(--green)">Cuadrado ✓</span>')}

async function confirmarAprobacion(id){
  const comentario = document.getElementById('comentario-aprobacion').value;
  const esDirector = USER.role === 'director';
  const idx = allSolicitudes.findIndex(s=>s.id===id);
  if(idx>=0){
    allSolicitudes[idx].estado = 'pendiente_administracion';
    if(esDirector) allSolicitudes[idx].aprobadoDirector = USER.name;
    else allSolicitudes[idx].aprobadoGerente = USER.name;
    allSolicitudes[idx].comentarioAprobacion = comentario;
    saveSolicitudLocal(allSolicitudes[idx]);
  }
  const campos = {
    Estado: 'pendiente_administracion',
    ComentarioGerente: comentario || ''
  };
  if(esDirector){
    campos.AprobadoDirector    = USER.name;
    campos.FechaAprobDirector  = today();
  } else {
    campos.AprobadoGerente     = USER.name;
    campos.FechaAprobGerente   = today();
  }
  await spUpdateEstado(id, campos);
  closeModal(); updateBadges();
  toast(`Solicitud aprobada y enviada a ${ADMIN_NAME} (Administración)`, 'success');
  renderAutorizaciones(document.getElementById('content'));
}

  document.body.insertAdjacentHTML('beforeend', `

        <div class="modal-footer">

async function confirmarRechazo(id){
  const motivo = document.getElementById('motivo-rechazo').value.trim();
  if(!motivo){ toast('Indica el motivo del rechazo', 'error'); return; }
  const idx = allSolicitudes.findIndex(s=>s.id===id);
  if(idx>=0){
    allSolicitudes[idx].estado = 'rechazado';
    allSolicitudes[idx].comentarioRechazo = motivo;
    allSolicitudes[idx].rechazadoPor = USER.name;
    saveSolicitudLocal(allSolicitudes[idx]);
  }
  await spUpdateEstado(id, {
    Estado:        'rechazado',
    MotivoRechazo: motivo,
    RechazadoPor:  USER.name
  });
  closeModal(); updateBadges();
  toast('Solicitud rechazada — el colaborador será notificado', 'error');
  renderAutorizaciones(document.getElementById('content'));
}

function calcDiasDesdeRegreso(fechaRegreso){
  if(!fechaRegreso) return 0;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const reg = new Date(fechaRegreso); reg.setHours(0,0,0,0);
  let dias = 0, d = new Date(reg);
  while(d < hoy){ d.setDate(d.getDate()+1); if(d.getDay()!==0&&d.getDay()!==6) dias++; }
  return dias;
}

    return dias > 0 && dias <= DIAS_COMPROBACION;

  c.innerHTML = `

      Notificar a ${ADMIN_NAME} y proceder a cobro descontando de nómina.
    </div>` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><span class="card-title">🔴 Comprobación vencida — acción requerida</span></div>
      <div class="table-wrap">
        <table>

            ${recienVencidos.length || vencidos.length ?

                  <td class="mono">${s.id}</td>
                  <td><strong>${s.empleado}</strong><br><span style="font-size:11px;color:var(--text2)">${s.email}</span></td>
                  <td>${fmtDate(s.fechaRegreso)}</td>

                  <td style="font-family:'DM Mono',monospace;color:var(--accent)">${fmtMXN(s.montoEntregado)}</td>
                  <td><button class="btn btn-red" style="font-size:12px;padding:5px 10px" onclick="notificarVencimiento('${s.id}')">📧 Notificar</button></td>
                </tr>`;}).join('')
              : '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text2)">✅ Sin vencimientos</td></tr>'}
          </tbody>
        </table>
      </div>

    <div class="card">
      <div class="card-header"><span class="card-title">🟡 En viaje — comprobación pendiente</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Folio</th><th>Colaborador</th><th>Regreso</th><th>Días restantes</th><th>Anticipo</th></tr></thead>

async function confirmarAnticipo(id){
  const monto  = document.getElementById('a-monto').value;
  const fecha  = document.getElementById('a-fecha').value;
  const metodo = document.getElementById('a-metodo').value;
  const ref    = document.getElementById('a-ref').value.trim();
  if(!monto||!ref){ toast('Completa monto y referencia', 'error'); return; }

  // Calcular fecha límite: 5 días hábiles desde hoy
  function addDiasHabiles(d, n){
    const dt = new Date(d);
    let added = 0;
    while(added < n){
      dt.setDate(dt.getDate()+1);
      if(dt.getDay()!==0 && dt.getDay()!==6) added++;
    }
    return dt.toISOString().slice(0,10);
  }
  const sol = allSolicitudes.find(s=>s.id===id);
  const fechaLimite = addDiasHabiles(sol?.fechaRegreso || today(), DIAS_COMPROBACION);

  const idx = allSolicitudes.findIndex(s=>s.id===id);
  if(idx>=0){
    allSolicitudes[idx].montoEntregado      = Number(monto);
    allSolicitudes[idx].fechaAnticipo       = fecha;
    allSolicitudes[idx].metodoAnticipo      = metodo;
    allSolicitudes[idx].referenciaAnticipo  = ref;
    allSolicitudes[idx].estado              = 'en_viaje';
    allSolicitudes[idx].fechaLimiteComp     = fechaLimite;
    saveSolicitudLocal(allSolicitudes[idx]);
  }
  await spUpdateEstado(id, {
    Estado:              'en_viaje',
    MontoEntregado:      Number(monto),
    FechaAnticipo:       fecha,
    MetodoAnticipo:      metodo,
    ReferenciaAnticipo:  ref,
    FechaLimiteComp:     fechaLimite
  });
  closeModal();
  toast(`Anticipo de ${fmtMXN(monto)} registrado. Límite comprobación: ${fmtDate(fechaLimite)}`, 'success');
  renderTesoreria(document.getElementById('content'));
}

function exportarCSV(){
  const headers = ['Folio','Empleado','Email','Destino','Motivo','Salida','Regreso','CC','Proyecto','Total','Anticipo Solicitado','Anticipo Entregado','Estado'];
  const rows = allSolicitudes.map(s=>[s.id,s.empleado,s.email,s.destino,s.motivo,s.fechaSalida,s.fechaRegreso,s.centroCosto,s.proyecto,s.montoTotal,s.montoAnticipo,s.montoEntregado,STATUS_LABELS[s.estado]||s.estado]);
  const csv = [headers, ...rows].map(r=>r.map(v=>`"${v||''}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `viaticos_faza_${today()}.csv`;
  a.click();
  toast('CSV exportado', 'success');
}

function calcDurationSC(){
  const s = document.getElementById('sc-salida')?.value;
  const r = document.getElementById('sc-regreso')?.value;
  if(s && r){
    const diff = Math.round((new Date(r)-new Date(s))/(1000*60*60*24));
    document.getElementById('sc-duracion').value = diff>=0?`${diff+1} día${diff!==0?'s':''}` : '—';
  }
  calcAutoEstimacionSC();
}

function calcTotalSC(){
  const ids = ['sc-b-hospedaje','sc-b-alim','sc-b-trans','sc-b-comb','sc-b-otros'];
  const total = ids.reduce((s,id)=>s+Number(document.getElementById(id)?.value||0),0);
  const el = document.getElementById('sc-total-display');
  if(el) el.textContent = fmtMXN(total);
  return total;
}

function calcAutoEstimacionSC(){
  const suc     = document.getElementById('sc-sucursal')?.value;
  const horaSal = document.getElementById('sc-hora-salida')?.value || '07:00';
  const horaReg = document.getElementById('sc-hora-regreso')?.value || '18:00';
  const zona    = suc && suc!=='__otro__' ? getZonaDeSucursal(suc) : null;
  if(!zona) return;
  const s = document.getElementById('sc-salida')?.value;
  const r = document.getElementById('sc-regreso')?.value;
  if(!s||!r) return;
  const dias = Math.max(1, Math.round((new Date(r)-new Date(s))/(1000*60*60*24))+1);
  const L = zona.limites;
  const horaSalH = parseInt(horaSal.split(':')[0]);
  const horaRegH = parseInt(horaReg.split(':')[0]);
  const usaEmpresa = document.getElementById('sc-cb-transporte')?.checked||false;
  let totalAlim = 0;
  if(dias===1){ totalAlim = horaSalH<8?L.alimDiaTotal:L.alimMedioTotal; }
  else {
    totalAlim += horaSalH<8?L.alimDiaTotal:L.alimMedioTotal;
    if(dias>2) totalAlim += L.alimDiaTotal*(dias-2);
    totalAlim += horaRegH>=14?L.alimDiaTotal:L.alimMedioTotal;
  }
  const totalTrans = usaEmpresa?0:L.transporteLocal*dias;
  const bAlim = document.getElementById('sc-b-alim');
  const bTrans = document.getElementById('sc-b-trans');
  const biTrans = document.getElementById('sc-bi-trans');
  if(bAlim) bAlim.value = totalAlim;
  if(bTrans) bTrans.value = totalTrans;
  if(biTrans){ biTrans.style.opacity=usaEmpresa?'0.4':'1'; biTrans.style.pointerEvents=usaEmpresa?'none':'auto'; }
  const avisoEl = document.getElementById('sc-budget-avisos');
  if(avisoEl) avisoEl.innerHTML = `<div class="alert alert-info" style="margin-bottom:8px">
    📊 <strong>Estimación automática — ${dias} día${dias>1?'s':''}:</strong>
    Alimentación: <strong>${fmtMXN(totalAlim)}</strong>
    ${usaEmpresa?' · 🚐 Transporte: Vehículo empresa':` · 🚗 Transporte: <strong>${fmtMXN(totalTrans)}</strong>`}
  </div>`;
  calcTotalSC();
}

async function enviarSolicitudSinCuenta(){
  const nombre    = document.getElementById('sc-nombre')?.value.trim();
  const numEmp    = document.getElementById('sc-num-empleado')?.value.trim();
  const suc       = document.getElementById('sc-sucursal')?.value;
  const motivo    = document.getElementById('sc-motivo')?.value.trim();
  const objetivo  = document.getElementById('sc-objetivo')?.value.trim();
  const salida    = document.getElementById('sc-salida')?.value;
  const regreso   = document.getElementById('sc-regreso')?.value;
  const horaSal   = document.getElementById('sc-hora-salida')?.value||'07:00';
  const horaReg   = document.getElementById('sc-hora-regreso')?.value||'18:00';
  const cc        = document.getElementById('sc-cc')?.value;
  const proyecto  = document.getElementById('sc-proyecto')?.value||'';
  const duracion  = document.getElementById('sc-duracion')?.value||'';
  const usaEmpresa= document.getElementById('sc-cb-transporte')?.checked||false;
  const total     = calcTotalSC();

  if(!nombre)   { toast('Ingresa el nombre del colaborador','error'); return; }
  if(!numEmp)   { toast('Ingresa el número de empleado','error'); return; }
  if(!suc)      { toast('Selecciona la sucursal','error'); return; }
  if(!motivo)   { toast('Ingresa el motivo del viaje','error'); return; }
  if(!objetivo) { toast('Ingresa el objetivo del viaje','error'); return; }
  if(!cc)       { toast('Selecciona el centro de costos','error'); return; }
  if(total<=0)  { toast('La estimación debe ser mayor a $0','error'); return; }

  const zona = suc!=='__otro__' ? getZonaDeSucursal(suc) : null;
  const primerEstado = 'pendiente_administracion'; // Gerente genera = ya aprobado, va directo a Administración

  const obj = {
    id: genId(), fechaSolicitud: today(),
    empleado:   USER.name, // El Gerente es quien lo genera
    email:      USER.email,
    esSinCuenta: true,
    nombreColabSinCuenta: nombre,
    numEmpleado: numEmp,
    sucursal:   suc, destino: suc,
    zona:       zona?.nombre||'Sin zona', zonaId: zona?.id||'',
    motivo, objetivo,
    fechaSalida: salida, fechaRegreso: regreso,
    horaSalida: horaSal, horaRegreso: horaReg, duracion,
    centroCosto: cc, proyecto,
    estHospedaje:    Number(document.getElementById('sc-b-hospedaje')?.value||0),
    estAlimentacion: Number(document.getElementById('sc-b-alim')?.value||0),
    estTransporte:   Number(document.getElementById('sc-b-trans')?.value||0),
    estCombustible:  Number(document.getElementById('sc-b-comb')?.value||0),
    estOtros:        Number(document.getElementById('sc-b-otros')?.value||0),
    montoTotal: total, montoAnticipo: total,
    solicitaAnticipo: 'si', montoEntregado: 0,
    hospedajeGestionado: zona?.hospedajeGestionado||false,
    vueloGestionado: zona?.vueloGestionado||false,
    transporteEmpresa: usaEmpresa,
    notas: document.getElementById('sc-notas')?.value.trim()||'',
    archivosBitacora:'', estado: primerEstado
  };

  showLoading('Guardando solicitud...');

  // Subir bitácora si existe
  const bitacoraFile = document.getElementById('sc-bitacora')?.files?.[0];
  if(bitacoraFile){
    obj.archivosBitacora = bitacoraFile.name;
    const url = await subirBitacoraSP(bitacoraFile, obj.id);
    if(url) obj.archivosBitacora = url;
  }

  const res = await apiCall('saveSolicitud', { solicitud: obj });
  if(bitacoraFile && obj.archivosBitacora?.startsWith('/')){
    await spUpdateEstado(obj.id, { ArchivosBitacora: obj.archivosBitacora }).catch(()=>{});
  }
  saveSolicitudLocal(obj);
  allSolicitudes = getSolicitudesLocal();
  hideLoading();
  toast(`Solicitud ${obj.id} generada para ${nombre} — enviada a ${ADMIN_NAME} (Administración)`, 'success');
  navigateTo('mis-solicitudes');
}

   Gestión de hospedaje y vuelos
═══════════════════════════════════════════════════════ */
// Un folio necesita logística si tiene 2+ días o requiere hospedaje/vuelo gestionado
function necesitaLogistica(s){
  if(!s.fechaSalida || !s.fechaRegreso) return false;
  // Calcular días
  const diff = Math.round(
    (new Date(s.fechaRegreso+'T12:00:00') - new Date(s.fechaSalida+'T12:00:00'))
    / (1000*60*60*24)
  );
  // 2+ días (diff >= 1 significa que hay al menos 1 noche)
  if(diff >= 1) return true;
  // O si la zona requiere hospedaje/vuelo gestionado
  if(s.hospedajeGestionado === true || s.vueloGestionado === true) return true;
  return false;
}

function esLogisticaCompletada(s){
  // true solo si explícitamente se marcó como completada
  return s.logisticaCompletada === true;
}

async function guardarLogistica(id){
  const val = el => document.getElementById(el)?.value || '';
  const num = el => Number(document.getElementById(el)?.value||0);
  const s   = allSolicitudes.find(x=>x.id===id);
  if(!s) return;

  const campos = {
    HotelNombre:      val('lg-hotel-nombre'),
    HotelDireccion:   val('lg-hotel-dir'),
    HotelCosto:       num('lg-hotel-costo'),
    HotelCheckIn:     val('lg-checkin')||null,
    HotelCheckOut:    val('lg-checkout')||null,
    HotelReservacion: val('lg-hotel-res'),
    AerolineaNombre:  val('lg-aerolinea'),
    VueloNumero:      val('lg-vuelo-num'),
    VueloCosto:       num('lg-vuelo-costo'),
    VueloFecha:       val('lg-vuelo-fecha')||null,
    LogisticaCompletada: true,
  };

  showLoading('Guardando logística...');
  await spUpdateEstado(id, campos);

  // Actualizar localmente
  const idx = allSolicitudes.findIndex(x=>x.id===id);
  if(idx>=0){
    Object.assign(allSolicitudes[idx], {
      hotelNombre:      campos.HotelNombre,
      hotelDireccion:   campos.HotelDireccion,
      hotelCosto:       campos.HotelCosto,
      hotelCheckIn:     campos.HotelCheckIn,
      hotelCheckOut:    campos.HotelCheckOut,
      hotelReservacion: campos.HotelReservacion,
      aerolineaNombre:  campos.AerolineaNombre,
      vueloNumero:      campos.VueloNumero,
      vueloCosto:       campos.VueloCosto,
      vueloFecha:       campos.VueloFecha,
      logisticaCompletada: true,
    });
    saveSolicitudLocal(allSolicitudes[idx]);
  }

  hideLoading();
  closeModal();
  updateBadges();
  toast('Logística guardada ✓ El colaborador puede ver los datos en su solicitud', 'success');
  renderLogisticaPendiente(document.getElementById('content'));
}
