function filtrarReporte(){
  const desde  = document.getElementById('rep-desde')?.value;
  const hasta  = document.getElementById('rep-hasta')?.value;
  const cc     = document.getElementById('rep-cc')?.value;
  const estado = document.getElementById('rep-estado')?.value;

  return allSolicitudes.filter(s => {
    const fecha = s.fechaSolicitud?.substring(0,7) || '';
    if(desde && fecha < desde) return false;
    if(hasta && fecha > hasta) return false;
    if(cc && s.centroCosto !== cc) return false;
    if(estado && s.estado !== estado) return false;
    return true;
  });
}

function generarReporte(){
  const data   = filtrarReporte();
  const desde  = document.getElementById('rep-desde')?.value;
  const hasta  = document.getElementById('rep-hasta')?.value;
  const res    = document.getElementById('reporte-resultado');

  if(data.length === 0){
    res.innerHTML = `<div class="empty-state"><div class="icon">📊</div><h3>Sin datos en el período</h3><p>Ajusta los filtros e intenta de nuevo.</p></div>`;
    document.getElementById('btn-xlsx').style.display = 'none';
    document.getElementById('btn-pdf').style.display  = 'none';
    return;
  }

  // ── Totales generales ──────────────────────────────────
  const totalMonto     = data.reduce((a,s)=>a+Number(s.montoTotal||0),0);
  const totalAnticipo  = data.reduce((a,s)=>a+Number(s.montoEntregado||0),0);
  const totalSolicitudes = data.length;
  const cerrados       = data.filter(s=>s.estado==='cerrado').length;
  const descuentos     = data.filter(s=>s.estado==='descuento_nomina').length;

  // ── Por departamento ───────────────────────────────────
  const porDepto = {};
  data.forEach(s=>{
    const d = s.centroCosto || 'Sin departamento';
    if(!porDepto[d]) porDepto[d] = { solicitudes:0, monto:0, anticipo:0 };
    porDepto[d].solicitudes++;
    porDepto[d].monto    += Number(s.montoTotal||0);
    porDepto[d].anticipo += Number(s.montoEntregado||0);
  });
  const deptoOrden = Object.entries(porDepto).sort((a,b)=>b[1].monto-a[1].monto);

  // ── Por empleado ───────────────────────────────────────
  const porEmpleado = {};
  data.forEach(s=>{
    const e = s.empleado || s.email;
    if(!porEmpleado[e]) porEmpleado[e] = { solicitudes:0, monto:0, anticipo:0, depto: s.centroCosto||'—', destinos:[] };
    porEmpleado[e].solicitudes++;
    porEmpleado[e].monto    += Number(s.montoTotal||0);
    porEmpleado[e].anticipo += Number(s.montoEntregado||0);
    if(!porEmpleado[e].destinos.includes(s.sucursal||s.destino))
      porEmpleado[e].destinos.push(s.sucursal||s.destino);
  });
  const empleadoOrden = Object.entries(porEmpleado).sort((a,b)=>b[1].monto-a[1].monto);

  // Guardar data para exportación
  window._reporteData  = data;
  window._reporteDepto = deptoOrden;
  window._reporteEmp   = empleadoOrden;
  window._reportePeriodo = `${desde} al ${hasta}`;

  res.innerHTML = `
    <!-- Resumen ejecutivo -->
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card stat-accent">
        <div class="stat-card-label">Total solicitudes</div>
        <div class="stat-card-value">${totalSolicitudes}</div>
        <div class="stat-card-sub">Período: ${desde} → ${hasta}</div>
      </div>
      <div class="stat-card stat-blue">
        <div class="stat-card-label">Monto total estimado</div>
        <div class="stat-card-value" style="font-size:18px">${fmtMXN(totalMonto)}</div>
      </div>
      <div class="stat-card stat-yellow">
        <div class="stat-card-label">Total anticipos entregados</div>
        <div class="stat-card-value" style="font-size:18px">${fmtMXN(totalAnticipo)}</div>
      </div>
      <div class="stat-card" style="border-left:3px solid var(--green)">
        <div class="stat-card-label">Folios cerrados</div>
        <div class="stat-card-value" style="color:var(--green)">${cerrados}</div>
        <div class="stat-card-sub" style="color:var(--red)">${descuentos} con descuento nómina</div>
      </div>
    </div>

    <!-- Por departamento -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><span class="card-title">🏢 Solicitudes por departamento</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Departamento</th><th>Solicitudes</th><th>% del total</th>
            <th>Monto estimado</th><th>Anticipos entregados</th>
          </tr></thead>
          <tbody>
            ${deptoOrden.map(([d,v])=>`<tr>
              <td><strong>${d}</strong></td>
              <td style="text-align:center">${v.solicitudes}</td>
              <td style="text-align:center">${Math.round(v.solicitudes/totalSolicitudes*100)}%</td>
              <td style="font-family:'DM Mono',monospace">${fmtMXN(v.monto)}</td>
              <td style="font-family:'DM Mono',monospace;color:var(--green)">${fmtMXN(v.anticipo)}</td>
            </tr>`).join('')}
            <tr style="border-top:2px solid var(--border);font-weight:600">
              <td>TOTAL</td>
              <td style="text-align:center">${totalSolicitudes}</td>

function exportarXLSX(){
  if(!window._reporteData) return;
  const data    = window._reporteData;
  const depto   = window._reporteDepto;
  const emp     = window._reporteEmp;
  const periodo = window._reportePeriodo;

  // Usar SheetJS (ya disponible como CDN en la app)
  const XLSX = window.XLSX;
  if(!XLSX){ toast('Cargando librería Excel...','info'); return; }

  const wb = XLSX.utils.book_new();

  // ── Hoja 1: Resumen por departamento ──
  const hdep = [['REPORTE DE VIÁTICOS — GRUPO FAZA'],['Período: ' + periodo],[''],
    ['Departamento','Solicitudes','% del total','Monto estimado MXN','Anticipos entregados MXN']];
  const total = data.length;
  const totMonto = data.reduce((a,s)=>a+Number(s.montoTotal||0),0);
  const totAnti  = data.reduce((a,s)=>a+Number(s.montoEntregado||0),0);
  depto.forEach(([d,v])=>{
    hdep.push([d, v.solicitudes, Math.round(v.solicitudes/total*100)+'%',
      Number(v.monto.toFixed(2)), Number(v.anticipo.toFixed(2))]);
  });
  hdep.push(['TOTAL', total, '100%', Number(totMonto.toFixed(2)), Number(totAnti.toFixed(2))]);
  const ws1 = XLSX.utils.aoa_to_sheet(hdep);
  ws1['!cols'] = [{wch:35},{wch:14},{wch:12},{wch:22},{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Por Departamento');

  // ── Hoja 2: Por empleado ──
  const hemp = [['REPORTE DE VIÁTICOS — GRUPO FAZA'],['Período: ' + periodo],[''],
    ['Empleado','Departamento','Solicitudes','Monto estimado MXN','Anticipos MXN','Destinos visitados']];
  emp.forEach(([e,v])=>{
    hemp.push([e, v.depto, v.solicitudes,
      Number(v.monto.toFixed(2)), Number(v.anticipo.toFixed(2)), v.destinos.join(', ')]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(hemp);
  ws2['!cols'] = [{wch:30},{wch:30},{wch:12},{wch:22},{wch:18},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Por Empleado');

  // ── Hoja 3: Detalle completo de folios ──
  const hdet = [['REPORTE DE VIÁTICOS — GRUPO FAZA'],['Período: ' + periodo],[''],
    ['Folio','Empleado','Departamento','Destino','F. Solicitud','F. Aprobación Gerente',
     'F. Aprobación Admon','Aprobó Gerente','Validó Admon',
     'Fecha Salida','Fecha Regreso','Monto Estimado MXN','Anticipo MXN','Estado']];
  data.forEach(s=>{
    hdet.push([
      s.id, s.empleado||'', s.centroCosto||'', s.sucursal||s.destino||'',
      s.fechaSolicitud||'', s.fechaAprobGerente||'', s.fechaValidAdmon||'',
      s.aprobadoGerente||'', s.validadoAdmon||'',
      s.fechaSalida||'', s.fechaRegreso||'',
      Number(Number(s.montoTotal||0).toFixed(2)),
      Number(Number(s.montoEntregado||0).toFixed(2)),
      STATUS_LABELS[s.estado]||s.estado
    ]);
  });
  // Fila de totales
  hdet.push(['','','','','','','','','','','TOTAL',
    Number(totMonto.toFixed(2)), Number(totAnti.toFixed(2)),'']);
  const ws3 = XLSX.utils.aoa_to_sheet(hdet);
  ws3['!cols'] = [{wch:14},{wch:28},{wch:28},{wch:22},{wch:14},{wch:22},{wch:22},
    {wch:22},{wch:22},{wch:14},{wch:14},{wch:20},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Detalle Folios');

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Reporte_Viaticos_Faza_${fecha}.xlsx`);
  toast('Reporte Excel descargado ✓', 'success');
}

function exportarPDF(){
  if(!window._reporteData){ toast('Genera el reporte primero','error'); return; }
  // Ocultar botones y controles para impresión limpia
  const btns = document.querySelectorAll('#btn-xlsx,#btn-pdf,.card-body,.filter-row');
  btns.forEach(b=>b.style.display='none');
  // Título temporal
  const titulo = document.createElement('div');
  titulo.id = 'print-titulo';
  titulo.style.cssText = 'padding:16px 0 8px;font-size:18px;font-weight:700;color:#000';
  titulo.textContent = `Reporte de Viáticos — Grupo Faza | Período: ${window._reportePeriodo}`;
  document.getElementById('reporte-resultado').prepend(titulo);
  window.print();
  // Restaurar
  setTimeout(()=>{
    btns.forEach(b=>b.style.display='');
    titulo.remove();
  }, 1000);
}

function guiaTab(id, el){
  ['roles','f1','f2','est'].forEach(t=>{
    const p = document.getElementById('gt-'+t);
    if(p) p.style.display = t===id ? 'block' : 'none';
  });
  document.querySelectorAll('#guia-tabs button').forEach(b=>{
    b.className = 'btn btn-ghost';
    b.style.borderRadius = '20px';
    b.style.fontSize = '12px';
  });
  if(el){ el.className = 'btn btn-primary'; el.style.borderRadius='20px'; el.style.fontSize='12px'; }
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
// Inicializar MSAL al cargar la página
window.addEventListener('load', async () => {
  applyTheme();
  // Asegurar sidebar cerrado en móvil al cargar
  if(window.innerWidth <= 768){
    const sb = document.getElementById('sidebar');
    if(sb) sb.classList.remove('open');
  }
  initMSAL();
  try {
    await msalApp.initialize();
    // Manejar el retorno del redirect de Microsoft
    const redirectResp = await msalApp.handleRedirectPromise();
    if(redirectResp && redirectResp.account){
      // Viene de redirect exitoso
      await cargarUsuarioM365(redirectResp.account);
      return;
    }
    // Si ya hay sesión activa en caché, entrar directo
    const accounts = msalApp.getAllAccounts();
    if(accounts.length > 0){
      const status = document.getElementById('login-status');
      if(status) status.textContent = 'Recuperando sesión...';
      await cargarUsuarioM365(accounts[0]);
    }
  } catch(e){
    console.warn('Init MSAL:', e);
    const status = document.getElementById('login-status');
    if(status) status.textContent = '';
  }
});
</script>
